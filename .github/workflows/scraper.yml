name: Raspagem Diaria Copa 2026

on:
  schedule:
    # -------------------------------------------------------------
    # Horários aos 20 minutos de cada hora solicitada
    # Horários locais: 15:20 até 03:20
    # -------------------------------------------------------------
    - cron: '20 0-6,18-23 * * *'

    # -------------------------------------------------------------
    # Horários aos 50 minutos específicos
    # Horários locais: 19:50, 22:50, 00:50
    # -------------------------------------------------------------
    - cron: '50 1,3,22 * * *'

  workflow_dispatch: # Mantém o botão de execução manual

permissions:
  contents: write # Permite que o bot faça o commit do JSON de volta no repositório

jobs:
  raspar_dados:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Rodar o script
        run: python scraper_copa.py

      - name: Salvar os dados (Commit)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Atualização automática dos placares"
          file_pattern: 'resultados_copa.json'
